<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Petr's Brain v2.6</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <style>
        body { background: #0b0f1a; color: #e2e8f0; font-family: sans-serif; overflow: hidden; }
        .module-btn { transition: all 0.2s; border: 1px solid #1e293b; background: #161e2e; cursor: pointer; width: 100%; text-align: left; padding: 12px; border-radius: 12px; margin-bottom: 8px; font-size: 14px; }
        .module-btn:hover { background: #1e293b; border-color: #38bdf8; }
        .active-module { background: #1e293b; border-color: #0ea5e9; box-shadow: 0 0 15px rgba(14, 165, 233, 0.1); }
        .card { background: rgba(30, 41, 59, 0.4); border: 1px solid #334155; border-radius: 16px; padding: 1.25rem; margin-bottom: 1rem; }
        .scroll-area { height: calc(100vh - 160px); overflow-y: auto; scrollbar-width: thin; }
    </style>
</head>
<body class="flex h-screen bg-[#080c14]">

    <nav class="w-64 bg-slate-900 border-r border-slate-800 flex flex-col p-5">
        <div class="mb-8 px-2">
            <h1 class="text-2xl font-black text-sky-400 italic">PETR'S BRAIN</h1>
            <p class="text-[9px] text-slate-500 uppercase tracking-widest font-bold">Stable v2.6</p>
        </div>
        
        <div class="flex-1">
            <button onclick="switchModule('notes')" id="btn-notes" class="module-btn active-module"><span>📝</span> Zápisník</button>
            <button onclick="switchModule('week')" id="btn-week" class="module-btn"><span>📅</span> Týden & Okna</button>
            <button onclick="switchModule('family')" id="btn-family" class="module-btn"><span>👨‍👩‍👧</span> Rodina</button>
            <button onclick="switchModule('projects')" id="btn-projects" class="module-btn"><span>🏗️</span> Projekty</button>
        </div>

        <div class="mt-auto pt-4 border-t border-slate-800">
            <div id="status-info" class="text-[10px] mb-4 space-y-1 font-mono text-slate-500">
                <div id="st-cal">● CALENDAR SYNC</div>
            </div>
            <button onclick="openSettings()" class="w-full py-3 bg-slate-800 hover:bg-slate-700 text-slate-300 font-bold rounded-xl text-[10px] uppercase tracking-widest transition-all">
                ⚙️ NASTAVENÍ
            </button>
        </div>
    </nav>

    <main class="flex-1 flex flex-col">
        <header class="h-16 border-b border-slate-800 flex items-center px-8 bg-slate-900/20">
            <h2 id="module-title" class="text-sm font-bold uppercase tracking-widest text-slate-400">Zápisník</h2>
        </header>

        <div id="content" class="flex-1 p-8 scroll-area"></div>

        <footer class="p-6 bg-slate-900/40 border-t border-slate-800/60">
            <div class="max-w-4xl mx-auto flex gap-4">
                <input type="text" id="main-input" onkeypress="if(event.key==='Enter')handleInput()" placeholder="Zapiš si postřeh..." 
                       class="flex-1 bg-slate-800/30 border border-slate-700/40 rounded-2xl px-6 focus:outline-none focus:border-sky-500/50 text-sm">
                <button onclick="handleInput()" class="bg-sky-600 hover:bg-sky-500 px-8 rounded-2xl font-bold shadow-lg transition-all active:scale-95">ULOŽIT</button>
            </div>
        </footer>
    </main>

    <div id="modal-settings" class="hidden fixed inset-0 bg-black/90 flex items-center justify-center z-50">
        <div class="bg-slate-900 border border-slate-700 p-8 rounded-3xl max-w-sm w-full shadow-2xl">
            <h3 class="text-xl font-bold mb-4 text-white uppercase italic">Nastavení</h3>
            <p class="text-slate-400 text-[10px] mb-6 uppercase tracking-widest">Client ID z Google Console</p>
            <input type="text" id="input-client-id" class="w-full bg-slate-800 border border-slate-700 rounded-xl p-4 text-xs mb-6 font-mono text-sky-400">
            <div class="flex flex-col gap-2">
                <button onclick="saveClientId()" class="w-full bg-sky-600 py-4 rounded-xl font-bold text-xs uppercase tracking-widest">Uložit a Restartovat</button>
                <button onclick="closeSettings()" class="w-full py-2 text-slate-500 text-[10px] font-bold uppercase">Zrušit</button>
            </div>
        </div>
    </div>

    <script>
        let state = {
            currentModule: 'notes',
            clientId: localStorage.getItem('pb_client_id') || '',
            notes: JSON.parse(localStorage.getItem('pb_notes')) || [],
            events: []
        };

        let tokenClient;
        let accessToken = null;

        window.onload = () => {
            document.getElementById('input-client-id').value = state.clientId;
            if (state.clientId) initGapi();
            switchModule('notes');
        };

        function initGapi() {
            tokenClient = google.accounts.oauth2.initTokenClient({
                client_id: state.clientId,
                scope: 'https://www.googleapis.com/auth/calendar.readonly',
                callback: (resp) => {
                    accessToken = resp.access_token;
                    document.getElementById('st-cal').style.color = '#22c55e';
                    if(state.currentModule === 'week') syncCalendar();
                },
            });
        }

        function switchModule(mod) {
            state.currentModule = mod;
            document.querySelectorAll('.module-btn').forEach(b => b.classList.remove('active-module'));
            const btn = document.getElementById('btn-' + mod);
            if(btn) btn.classList.add('active-module');
            document.getElementById('module-title').innerText = btn ? btn.innerText.substring(3) : mod;
            render();
        }

        async function syncCalendar() {
            if (!accessToken) { tokenClient.requestAccessToken(); return; }
            try {
                const resp = await fetch(`https://www.googleapis.com/calendar/v3/calendars/primary/events?timeMin=${new Date().toISOString()}`, {
                    headers: { 'Authorization': `Bearer ${accessToken}` }
                });
                const data = await resp.json();
                state.events = data.items || [];
                render();
            } catch (e) { console.error(e); }
        }

        function render() {
            const container = document.getElementById('content');
            container.innerHTML = '';

            if (state.currentModule === 'notes') {
                container.innerHTML = state.notes.map(n => `
                    <div class="card border-l-4 border-sky-500/30">
                        <div class="text-[10px] text-slate-500 mb-2 font-mono">${new Date(n.time).toLocaleString('cs-CZ')}</div>
                        <p class="text-sm font-medium leading-relaxed">${n.text}</p>
                    </div>
                `).reverse().join('') || '<p class="text-center py-20 opacity-20 italic uppercase tracking-widest text-xs">Žádné zápisky</p>';
            } 
            else if (state.currentModule === 'week') {
                let html = `<div class="flex justify-between items-center mb-8"><h3 class="text-xl font-black italic">PROGRAM</h3><button onclick="syncCalendar()" class="bg-sky-600 px-4 py-2 rounded-xl text-[10px] font-bold uppercase tracking-widest">Aktualizovat</button></div>`;
                if (state.events.length > 0) {
                    state.events.forEach(ev => {
                        const time = ev.start.dateTime ? new Date(ev.start.dateTime).toLocaleTimeString('cs-CZ', {hour:'2-digit', minute:'2-digit'}) : 'Celý den';
                        html += `<div class="card flex justify-between items-center"><div class="flex items-center gap-4"><span class="text-sky-500 font-mono text-lg font-black">${time}</span><span class="text-sm font-bold text-slate-200">${ev.summary}</span></div></div>`;
                    });
                } else {
                    html += `<div class="text-center py-20"><button onclick="syncCalendar()" class="bg-slate-800 px-6 py-4 rounded-2xl text-[10px] font-black tracking-widest uppercase">Načíst kalendář</button></div>`;
                }
                container.innerHTML = html;
            }
        }

        function handleInput() {
            const input = document.getElementById('main-input');
            if (!input.value) return;
            state.notes.push({ text: input.value, time: new Date().toISOString() });
            localStorage.setItem('pb_notes', JSON.stringify(state.notes));
            input.value = '';
            render();
        }

        function openSettings() { document.getElementById('modal-settings').classList.remove('hidden'); }
        function closeSettings() { document.getElementById('modal-settings').classList.add('hidden'); }
        function saveClientId() {
            const val = document.getElementById('input-client-id').value.trim();
            if(val) {
                localStorage.setItem('pb_client_id', val
