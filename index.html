<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Petr's Brain v6.2</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://accounts.google.com/gsi/client" async defer></script>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
    :root { --bg: #1a1a18; --bg2: #222220; --accent: #d4d4d0; --sky: #0ea5e9; }
    body { background: var(--bg); color: var(--accent); font-family: 'DM Sans', sans-serif; }
    h1, h2, .serif { font-family: 'DM Serif Display', serif; }
    .sidebar { background: var(--bg2); border-right: 1px solid rgba(255,255,255,0.05); }
    .nav-btn { padding: 12px 16px; border-radius: 12px; transition: 0.2s; font-size: 0.9rem; text-align: left; width: 100%; display: flex; align-items: center; gap: 12px; opacity: 0.6; color: var(--accent); }
    .nav-btn:hover { opacity: 1; background: rgba(255,255,255,0.03); }
    .nav-btn.active { opacity: 1; background: rgba(255,255,255,0.07); color: white; font-weight: 600; }
    .day-col { min-width: 280px; background: rgba(255,255,255,0.02); border-radius: 24px; padding: 20px; border: 1px solid rgba(255,255,255,0.03); }
    .event-item { background: rgba(255,255,255,0.03); border-radius: 12px; padding: 12px; border-left: 3px solid var(--sky); margin-bottom: 8px; font-size: 0.85rem; }
    #modal { display: none; }
    #modal.active { display: flex; }
</style>
</head>
<body class="flex h-screen overflow-hidden">

    <aside class="sidebar w-72 flex flex-col p-8 shrink-0">
        <div class="mb-12">
            <h1 class="text-3xl italic mb-1 text-white">Petr's Brain</h1>
            <p class="text-[10px] uppercase tracking-[0.3em] opacity-40 font-bold">Contextual v6.2</p>
        </div>

        <nav class="space-y-2 flex-1 overflow-y-auto">
            <button onclick="showPage('notes')" id="btn-notes" class="nav-btn active"><span>📝</span> Zápisník</button>
            <button onclick="showPage('week')" id="btn-week" class="nav-btn"><span>📅</span> Týden & Okna</button>
            <button onclick="showPage('family')" id="btn-family" class="nav-btn"><span>👨‍👩‍👧</span> Rodina</button>
            <button onclick="showPage('personal')" id="btn-personal" class="nav-btn"><span>🧘</span> Osobní</button>
            <button onclick="showPage('projects')" id="btn-projects" class="nav-btn"><span>🏗️</span> Projekty</button>
            <button onclick="showPage('method')" id="btn-method" class="nav-btn"><span>📖</span> Metodika</button>
        </nav>

        <div class="mt-auto pt-6 border-t border-white/5 space-y-4">
            <div class="flex items-center justify-between px-2">
                <span id="drive-dot" class="w-2 h-2 rounded-full bg-red-500"></span>
                <span id="sync-status" class="text-[9px] uppercase font-bold opacity-30 tracking-widest text-white">Drive Offline</span>
            </div>
            <button onclick="openSettings()" class="w-full py-3 rounded-xl bg-white/5 text-[10px] uppercase font-bold tracking-widest hover:bg-white/10 transition text-white">⚙️ Nastavení</button>
        </div>
    </aside>

    <main class="flex-1 flex flex-col min-w-0">
        <header class="h-24 flex items-center justify-between px-12 shrink-0">
            <h2 id="page-title" class="serif text-2xl italic text-white">Zápisník</h2>
            <div id="header-actions"></div>
        </header>

        <div id="main-content" class="flex-1 px-12 overflow-x-auto overflow-y-auto pb-12"></div>

        <footer class="p-8 shrink-0">
            <div class="max-w-4xl mx-auto relative group">
                <input type="text" id="ai-input" onkeydown="if(event.key==='Enter')handleCapture()" 
                       placeholder="Zapiš myšlenku..." 
                       class="w-full bg-[#222220] border border-white/5 rounded-2xl py-5 px-8 focus:outline-none focus:border-sky-500/30 text-lg text-white shadow-2xl transition-all">
                <button onclick="handleCapture()" class="absolute right-3 top-3 bottom-3 bg-sky-600 hover:bg-sky-500 text-white px-8 rounded-xl font-bold transition-all shadow-lg">ULOŽIT</button>
            </div>
        </footer>
    </main>

    <div id="modal" class="fixed inset-0 bg-black/90 items-center justify-center z-50 p-6">
        <div class="bg-[#222220] p-10 rounded-[2.5rem] border border-white/5 max-w-sm w-full shadow-2xl">
            <h3 class="serif text-2xl italic mb-6 text-white">Nastavení</h3>
            <div class="space-y-6">
                <div>
                    <label class="text-[10px] uppercase font-bold opacity-40 mb-2 block text-white">Google Client ID</label>
                    <input type="text" id="client-id-field" class="w-full bg-black/40 border border-white/5 rounded-xl p-4 text-xs font-mono text-sky-400 focus:outline-none focus:border-sky-500">
                </div>
                <button onclick="saveConfig()" class="w-full bg-sky-600 py-4 rounded-xl font-bold uppercase text-xs shadow-lg text-white">Uložit a Připojit</button>
                <button onclick="closeSettings()" class="w-full text-white/30 text-[10px] font-bold uppercase tracking-widest mt-4">Zavřít</button>
            </div>
        </div>
    </div>

<script>
let state = {
    currentPage: 'notes',
    entries: JSON.parse(localStorage.getItem('pb_entries')) || [],
    id: localStorage.getItem('pb_id') || '',
    calEvents: []
};

let googleClient;
let googleToken = null;

// Spuštění po načtení
window.onload = () => {
    if(state.id) initGoogle();
    showPage('notes');
};

function initGoogle() {
    googleClient = google.accounts.oauth2.initTokenClient({
        client_id: state.id,
        scope: 'https://www.googleapis.com/auth/calendar.readonly https://www.googleapis.com/auth/drive.file',
        callback: (resp) => {
            if(resp.access_token) {
                googleToken = resp.access_token;
                document.getElementById('drive-dot').className = 'w-2 h-2 rounded-full bg-green-500 shadow-[0_0_8px_#22c55e]';
                document.getElementById('sync-status').innerText = 'Online';
                syncAllCalendars();
            }
        }
    });
}

async function syncAllCalendars() {
    if (!googleToken) return;
    const now = new Date(); now.setHours(0,0,0,0);
    const maxDate = new Date(); maxDate.setDate(now.getDate() + 7);

    try {
        const listResp = await fetch('https://www.googleapis.com/calendar/v3/users/me/calendarList', {
            headers: { Authorization: `Bearer ${googleToken}` }
        });
        const listData = await listResp.json();
        
        let allEvents = [];
        for (const cal of (listData.items || [])) {
            try {
                const r = await fetch(`https://www.googleapis.com/calendar/v3/calendars/${encodeURIComponent(cal.id)}/events?timeMin=${now.toISOString()}&timeMax=${maxDate.toISOString()}&singleEvents=true&orderBy=startTime`, {
                    headers: { Authorization: `Bearer ${googleToken}` }
                });
                const d = await r.json();
                if(d.items) allEvents = allEvents.concat(d.items);
            } catch(e) {}
        }
        
        const uniqueEvents = Array.from(new Map(allEvents.map(item => [item.id, item])).values());
        state.calEvents = uniqueEvents.sort((a,b) => new Date(a.start.dateTime || a.start.date) - new Date(b.start.dateTime || b.start.date));
        
        if(state.currentPage === 'week') renderWeek();
    } catch(e) { console.error("Chyba kalendáře:", e); }
}

function showPage(page) {
    state.currentPage = page;
    document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
    const activeBtn = document.getElementById('btn-' + page);
    if(activeBtn) activeBtn.classList.add('active');
    
    document.getElementById('page-title').innerText = activeBtn ? activeBtn.innerText.substring(3) : "Brain";
    
    const actions = document.getElementById('header-actions');
    actions.innerHTML = '';

    if(page === 'week') {
        actions.innerHTML = `<button onclick="googleClient.requestAccessToken()" class="bg-sky-600/10 text-sky-400 px-6 py-2 rounded-xl text-[10px] font-bold uppercase border border-sky-500/20">Sync Kalendáře</button>`;
        renderWeek();
    } else {
        renderNotes(page);
    }
}

function renderWeek() {
    const content = document.getElementById('main-content');
    let html = `<div class="flex gap-6 h-full pb-4 overflow-x-auto">`;
    for(let i=0; i<7; i++) {
        const d = new Date(); d.setDate(d.getDate() + i);
        const dayEvents = state.calEvents.filter(e => new Date(e.start.dateTime || e.start.date).toDateString() === d.toDateString());
        
        html += `<div class="day-col shrink-0 w-80">
            <h3 class="serif text-lg italic mb-6 border-b border-white/5 pb-2 text-white/90">${d.toLocaleDateString('cs-CZ', {weekday:'long', day:'numeric'})}</h3>
            <div class="space-y-3">
                ${dayEvents.map(e => `
                    <div class="event-item">
                        <div class="text-[9px] text-sky-400 font-bold mb-1 uppercase tracking-tighter">${e.start.dateTime ? new Date(e.start.dateTime).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'}) : 'CELÝ DEN'}</div>
                        <div class="font-medium text-white/90 leading-tight">${e.summary}</div>
                    </div>`).join('') || '<p class="opacity-10 text-[10px] text-center mt-10 tracking-widest uppercase">Volno</p>'}
            </div>
        </div>`;
    }
    content.innerHTML = html + `</div>`;
}

function renderNotes(page) {
    const filtered = page === 'notes' ? state.entries : state.entries.filter(e => e.cat === page);
    document.getElementById('main-content').innerHTML = `<div class="max-w-3xl mx-auto space-y-6">${filtered.map(e => `
        <div class="bg-white/[0.02] p-8 rounded-3xl border border-white/5">
            <div class="text-[10px] text-white/20 font-bold mb-4 uppercase tracking-[0.2em]">${new Date(e.time).toLocaleString()}</div>
            <div class="text-lg leading-relaxed text-white/80">${e.text}</div>
        </div>`).reverse().join('') || '<div class="opacity-10 text-center py-20 serif italic text-xl uppercase tracking-widest">Prázdno</div>'}</div>`;
}

function handleCapture() {
    const inp = document.getElementById('ai-input');
    const val = inp.value.trim(); if(!val) return;
    let cat = 'notes';
    const low = val.toLowerCase();
    if(low.includes('rodina')) cat = 'family';
    else if(low.includes('práce') || low.includes('projekt')) cat = 'projects';
    else if(low.includes('osobní')) cat = 'personal';
    else if(low.includes('metoda')) cat = 'method';
    
    state.entries.push({ text: val, cat, time: new Date().toISOString() });
    localStorage.setItem('pb_entries', JSON.stringify(state.entries));
    inp.value = '';
    showPage(state.currentPage);
}

// Funkce pro MODAL (Nastavení)
function openSettings() { 
    document.getElementById('modal').classList.add('active'); 
    document.getElementById('client-id-field').value = state.id || ''; 
}
function closeSettings() { 
    document.getElementById('modal').classList.remove('active'); 
}
function saveConfig() { 
    const val = document.getElementById('client-id-field').value.trim();
    if(val) {
        localStorage.setItem('pb_id', val); 
        location.reload(); 
    }
}
</script>
</body>
</html>
