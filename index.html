<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Petr's Brain v3.3</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <style>
        body { background: #05070a; color: #e2e8f0; font-family: 'Inter', sans-serif; overflow: hidden; }
        .card { background: rgba(30, 41, 59, 0.4); border: 1px solid #1e293b; border-radius: 20px; }
        .active-mod { border-left: 4px solid #0ea5e9; background: #0f172a !important; color: white !important; }
        .scroll-area { height: calc(100vh - 180px); overflow-y: auto; }
        .ai-box { background: linear-gradient(135deg, rgba(14, 165, 233, 0.1) 0%, transparent 100%); border-left: 4px solid #0ea5e9; }
    </style>
</head>
<body class="flex h-screen bg-[#05070a]">

    <nav class="w-72 bg-slate-950 border-r border-slate-900 flex flex-col p-6">
        <div class="mb-10 px-2">
            <h1 class="text-2xl font-black text-sky-500 italic uppercase">Petr's Brain</h1>
            <p class="text-[9px] text-slate-600 font-bold tracking-[0.3em]">CONTEXTUAL ASSISTANT 3.3</p>
        </div>
        
        <div class="space-y-1 flex-1">
            <button onclick="switchModule('dash')" id="m-dash" class="active-mod w-full p-4 rounded-xl text-left text-slate-400 hover:bg-slate-900 flex items-center gap-3 transition-all font-bold text-sm"><span>🚀</span> PŘEHLED DNE</button>
            <button onclick="switchModule('notes')" id="m-notes" class="w-full p-4 rounded-xl text-left text-slate-400 hover:bg-slate-900 flex items-center gap-3 transition-all font-bold text-sm"><span>📝</span> ZÁPISNÍK</button>
            <button onclick="switchModule('family')" id="m-family" class="w-full p-4 rounded-xl text-left text-slate-400 hover:bg-slate-900 flex items-center gap-3 transition-all font-bold text-sm"><span>👨‍👩‍👧</span> RODINA & DĚTI</button>
        </div>

        <div class="mt-auto pt-6 border-t border-slate-900">
            <div id="sync-info" class="text-[10px] font-mono text-slate-600 mb-4 flex items-center gap-2">
                <span id="sync-dot" class="w-2 h-2 rounded-full bg-red-500"></span> <span id="sync-text">SYNCHRONIZACE VYPNUTA</span>
            </div>
            <button onclick="openSettings()" class="w-full py-3 bg-slate-900 rounded-xl text-[10px] font-bold text-slate-500 hover:text-white transition uppercase tracking-widest">⚙️ Konfigurace</button>
        </div>
    </nav>

    <main class="flex-1 flex flex-col">
        <header class="h-20 border-b border-slate-900 flex items-center justify-between px-10">
            <h2 id="head-title" class="text-xs font-black uppercase tracking-[0.2em] text-slate-500 italic">Přehled dne</h2>
            <button onclick="forceSync()" class="bg-sky-600 hover:bg-sky-500 text-white px-6 py-2 rounded-xl text-xs font-bold uppercase transition-all shadow-lg shadow-sky-900/20">Aktualizovat data</button>
        </header>

        <div id="content" class="flex-1 p-10 scroll-area"></div>

        <footer class="p-6 bg-slate-950 border-t border-slate-900">
            <div class="max-w-4xl mx-auto flex gap-4 relative">
                <input type="text" id="main-in" onkeypress="if(event.key==='Enter')handleInput()"
