<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <title>Petr's Brain - NOUZOVÝ REŽIM</title>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <style>
        body { background: #000; color: white; font-family: sans-serif; padding: 50px; text-align: center; }
        .box { border: 2px solid #333; padding: 20px; border-radius: 10px; display: inline-block; }
        button { padding: 15px 30px; font-size: 18px; cursor: pointer; background: #007bff; color: white; border: none; border-radius: 5px; margin: 10px; }
        input { padding: 10px; width: 300px; margin-bottom: 20px; display: block; margin-left: auto; margin-right: auto; }
        #log { margin-top: 20px; color: #888; font-size: 12px; }
    </style>
</head>
<body>

    <div class="box">
        <h1>Petr's Brain - Nastavení</h1>
        <p>Pokud vidíš toto, tlačítko MUSÍ fungovat.</p>
        
        <input type="text" id="idInput" placeholder="Vlož Client ID zde">
        <br>
        <button onclick="saveId()">1. ULOŽIT ID</button>
        <button onclick="requestToken()" style="background: #28a745;">2. PŘIPOJIT GOOGLE</button>
        <button onclick="window.location.reload()" style="background: #6c757d;">3. REFRESH</button>
        
        <div id="status" style="margin-top: 20px; font-weight: bold;"></div>
        <div id="output" style="text-align: left; margin-top: 20px;"></div>
    </div>

    <div id="log">Status: Čekám na akci...</div>

    <script>
        // Načtení uloženého ID
        document.getElementById('idInput').value = localStorage.getItem('pb_client_id') || '';

        function saveId() {
            const val = document.getElementById('idInput').value.trim();
            localStorage.setItem('pb_client_id', val);
            alert('ID uloženo. Teď klikni na Připojit Google.');
            location.reload();
        }

        function requestToken() {
            const clientId = localStorage.getItem('pb_client_id');
            if(!clientId) { alert('Chybí ID!'); return; }

            const client = google.accounts.oauth2.initTokenClient({
                client_id: clientId,
                scope: 'https://www.googleapis.com/auth/calendar.readonly',
                callback: (tokenResponse) => {
                    if (tokenResponse.access_token) {
                        document.getElementById('status').innerText = '✅ PŘIPOJENO!';
                        loadCalendar(tokenResponse.access_token);
                    }
                },
            });
            client.requestAccessToken();
        }

        async function loadCalendar(token) {
            document.getElementById('log').innerText = 'Načítám data...';
            try {
                const resp = await fetch('https://www.googleapis.com/calendar/v3/calendars/primary/events', {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const data = await resp.json();
                let html = '<h3>Tvé události:</h3><ul>';
                data.items.forEach(ev => {
                    html += `<li>${ev.summary}</li>`;
                });
                html += '</ul>';
                document.getElementById('output').innerHTML = html;
                document.getElementById('log').innerText = 'Hotovo.';
            } catch (e) {
                document.getElementById('log').innerText = 'Chyba: ' + e;
            }
        }
    </script>
</body>
</html>
