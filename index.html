<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Petr's Brain v2.5</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <style>
        body { background: #0b0f1a; color: #e2e8f0; font-family: sans-serif; overflow: hidden; }
        .active-module { border-color: #0ea5e9; background: #1e293b; }
        .card { background: rgba(30, 41, 59, 0.5); border: 1px solid #334155; border-radius: 12px; padding: 1rem; margin-bottom: 0.5rem; }
        /* Fix pro tlačítko, aby bylo VŽDY nahoře a klikatelné */
        .btn-fix { position: relative; z-index: 999 !important; cursor: pointer !important; pointer-events: auto !important; }
    </style>
</head>
<body class="flex h-screen bg-[#080c14]">

    <nav class="w-64 bg-slate-900 border-r border-slate-800 flex flex-col p-4">
        <div class="mb-8 px-2">
            <h1 class="text-xl font-bold text-sky-400">PETR'S BRAIN</h1>
            <p class="text-[10px] text-slate-500 uppercase">v2.5 Stable</p>
        </div>
        
        <div class="space-y-2 flex-1">
            <button onclick="switchModule('notes')" id="btn-notes" class="w-full p-3 rounded-xl text-left bg-slate-800/50 hover:bg-slate-800 border border-slate-700 active-module">📝 Zápisník</button>
            <button onclick="switchModule('week')" id="btn-week" class="w-full p-3 rounded-xl text-left bg-slate-800/50 hover:bg-slate-800 border border-slate-700">📅 Týden & Okna</button>
        </div>

        <div class="mt-auto pt-4 border-t border-slate-800">
            <div class="text-[10px] mb-4 space-y-1 opacity-50 font-mono">
                <div id="status-drive">● DRIVE SYNC</div>
                <div id="status-cal">● CALENDAR SYNC</div>
            </div>
            
            <button onclick="openSettings()" class="btn-fix w-full py-4 bg-sky-600 hover:bg-sky-500 text-white font-bold rounded-xl shadow-lg transition-all uppercase text-xs tracking-widest">
                ⚙️ NASTAVENÍ GOOGLE
            </button>
        </div>
    </nav>

    <main class="flex-1 flex flex-col">
        <header class="h-16 border-b border-slate-800 flex items-center px-8 bg-slate-900/30">
            <h2 id="module-title" class="font-bold uppercase tracking-widest text-slate-400">Zápisník</h2>
        </header>
        <div id="content" class="flex-1 p-8 overflow-y-auto"></div>
        <footer class="p-4 bg-slate-900/50 border-t border-slate-800">
            <div class="max-w-3xl mx-auto flex gap-3">
                <input type="text" id="main-input" onkeypress="if(event.key==='Enter')handleInput()" placeholder="Zapiš si postřeh..." class="flex-1 bg-slate-800 border border-slate-700 rounded-xl px-4 text-sm">
                <button onclick="handleInput()" class="bg-sky-600 px-6 rounded-xl font-bold">ULOŽIT</button>
            </div>
        </footer>
    </main>

    <div id="modal-settings" class="hidden fixed inset-0 bg-black/90 flex items-center justify-center" style="z-index: 9999;">
        <div class="bg-slate-900 border border-slate-700 p-8 rounded-3xl max-w-sm w-full">
            <h3 class="text-xl font-bold mb-4">Nastavení Google</h3>
            <input type="text" id="input-client-id" placeholder="Vlož Client ID..." class="w-full bg-slate-800 border border-slate-700 rounded-xl p-4 text-xs mb-4 font-mono">
            <button onclick="saveClientId()" class="w-full bg-sky-600 py-4 rounded-xl font-bold mb-2">ULOŽIT A REFRESH</button>
            <button onclick="closeSettings()" class="w-full py-2 text-slate-500 text-xs uppercase font-bold">Zrušit</button>
        </div>
    </div>

    <script>
        let state = {
            currentModule: 'notes',
            clientId: localStorage.getItem('pb_client_id') || '',
            notes: JSON.parse(localStorage.getItem('pb_notes')) || [],
            events: []
        };

        let tokenClient;
        let accessToken = null;

        window.onload = () => {
            if (state.clientId) initGapi();
            switchModule('notes');
        };

        function openSettings() {
            document.getElementById('modal-settings').classList.remove('hidden');
        }

        function closeSettings() {
            document.getElementById('modal-settings').classList.add('hidden');
        }

        function saveClientId() {
            const val = document.getElementById('input-client-id').value.trim();
            if(val) {
                localStorage.setItem('pb_client_id', val);
                location.reload();
            }
        }

        function initGapi() {
            try {
                tokenClient = google.accounts.oauth2.initTokenClient({
                    client_id: state.clientId,
                    scope: 'https://www.googleapis.com/auth/drive.file https://www.googleapis.com/auth/calendar.readonly',
                    callback: (resp) => {
                        accessToken = resp.access_token;
                        document.getElementById('status-drive').style.color = '#22c55e';
                        document.getElementById('status-cal').style.color = '#22c55e';
                        if(state.currentModule === 'week') syncCalendar();
                    },
                });
            } catch(e) { console.error(e); }
        }

        function switchModule(mod) {
            state.currentModule = mod;
            render();
        }

        async function syncCalendar() {
            if (!accessToken) { tokenClient.requestAccessToken(); return; }
            const start = new Date(); start.setHours(0,0,0,0);
            const end = new Date(); end.setHours(23,59,59,999);
            try {
                const listResp = await fetch(`https://www.googleapis.com/calendar/v3/users/me/calendarList`, {
                    headers: { 'Authorization': `Bearer ${accessToken}` }
                });
                const listData = await listResp.json();
                let allEvents = [];
                for (const cal of listData.items) {
                    const resp = await fetch(`https://www.googleapis.com/calendar/v3/calendars/${encodeURIComponent(cal.id)}/events?timeMin=${start.toISOString()}&timeMax=${end.toISOString()}&singleEvents=true&orderBy=startTime`, {
                        headers: { 'Authorization': `Bearer ${accessToken}` }
                    });
                    const data = await resp.json();
                    if (data.items) allEvents = allEvents.concat(data.items);
                }
                state.events = allEvents.sort((a, b) => new Date(a.start.dateTime || a.start.date) - new Date(b.start.dateTime || b.start.date));
                render();
            } catch (e) { console.error(e); }
        }

        function render() {
            const container = document.getElementById('content');
            container.innerHTML = '';
            if (state.currentModule === 'notes') {
                container.innerHTML = state.notes.map(n => `<div class="card"><div class="text-[10px] opacity-40 mb-1">${new Date(n.time).toLocaleString()}</div><p>${n.text}</p></div>`).reverse().join('') || 'Prázdno.';
            } else if (state.currentModule === 'week') {
                let html = `<button onclick="syncCalendar()" class="bg-sky-600 px-6 py-3 rounded-xl font-bold mb-6">AKTUALIZOVAT KALENDÁŘ</button>`;
                state.events.forEach(ev => {
                    const time = ev.start.dateTime ? new Date(ev.start.dateTime).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}) : 'Celý den';
                    html += `<div class="card"><span class="text-sky-400 font-mono mr-4">${time}</span><b>${ev.summary}</b></div>`;
                });
                container.innerHTML = html;
            }
        }

        function handleInput() {
            const input = document.getElementById('main-input');
            if (!input.value) return;
            state.notes.push({ text: input.value, time: new Date().toISOString() });
            localStorage.setItem('pb_notes', JSON.stringify(state.notes));
            input.value = '';
            render();
        }
    </script>
</body>
</html>
