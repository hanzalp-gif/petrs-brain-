<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Petr's Brain v4.0</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://accounts.google.com/gsi/client" async defer></script>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
    :root { --bg: #1a1a18; --bg2: #222220; --accent: #d4d4d0; --sky: #0ea5e9; }
    body { background: var(--bg); color: var(--accent); font-family: 'DM Sans', sans-serif; }
    h1, h2, .serif { font-family: 'DM Serif Display', serif; }
    .sidebar { background: var(--bg2); border-right: 1px solid rgba(255,255,255,0.05); }
    .nav-btn { padding: 12px 16px; border-radius: 12px; transition: 0.2s; font-size: 0.9rem; text-align: left; width: 100%; display: flex; align-items: center; gap: 12px; opacity: 0.6; }
    .nav-btn:hover { opacity: 1; background: rgba(255,255,255,0.03); }
    .nav-btn.active { opacity: 1; background: rgba(255,255,255,0.07); color: white; font-weight: 600; }
    .card { background: var(--bg3); border: 1px solid rgba(255,255,255,0.05); border-radius: 20px; padding: 24px; }
    .day-col { min-width: 280px; background: rgba(255,255,255,0.02); border-radius: 24px; padding: 20px; border: 1px solid rgba(255,255,255,0.03); }
    .event-item { background: rgba(255,255,255,0.03); border-radius: 12px; padding: 12px; border-left: 3px solid var(--sky); margin-bottom: 8px; font-size: 0.85rem; }
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 10px; }
</style>
</head>
<body class="flex h-screen overflow-hidden">

    <aside class="sidebar w-72 flex flex-col p-8">
        <div class="mb-12">
            <h1 class="text-3xl italic mb-1">Petr's Brain</h1>
            <p class="text-[10px] uppercase tracking-[0.3em] opacity-40 font-bold">Contextual v4.0</p>
        </div>

        <nav class="space-y-2 flex-1 overflow-y-auto">
            <button onclick="setTab('notes')" id="t-notes" class="nav-btn active"><span>📝</span> Zápisník</button>
            <button onclick="setTab('week')" id="t-week" class="nav-btn"><span>📅</span> Týden & Okna</button>
            <button onclick="setTab('family')" id="t-family" class="nav-btn"><span>👨‍👩‍👧</span> Rodina</button>
            <button onclick="setTab('personal')" id="t-personal" class="nav-btn"><span>🧘</span> Osobní</button>
            <button onclick="setTab('projects')" id="t-projects" class="nav-btn"><span>🏗️</span> Projekty</button>
            <button onclick="setTab('method')" id="t-method" class="nav-btn"><span>📖</span> Metodika</button>
        </nav>

        <div class="mt-auto pt-6 border-t border-white/5 space-y-4">
            <div class="flex items-center justify-between px-2">
                <span id="sync-dot" class="w-2 h-2 rounded-full bg-red-500"></span>
                <span id="sync-text" class="text-[9px] uppercase font-bold opacity-30 tracking-widest">Odpojeno</span>
            </div>
            <button onclick="openSettings()" class="w-full py-3 rounded-xl bg-white/5 text-[10px] uppercase font-bold tracking-widest hover:bg-white/10 transition">⚙️ Konfigurace</button>
        </div>
    </aside>

    <main class="flex-1 flex flex-col bg-[#1a1a18]">
        <header class="h-24 flex items-center justify-between px-12">
            <h2 id="tab-title" class="serif text-2xl italic">Zápisník</h2>
            <div id="header-btns"></div>
        </header>

        <div id="content" class="flex-1 px-12 overflow-y-auto pb-12">
            </div>

        <footer class="p-8">
            <div class="max-w-4xl mx-auto relative group">
                <input type="text" id="main-input" onkeypress="if(event.key==='Enter')saveEntry()" 
                       placeholder="Napiš myšlenku (např. 'Zítra stavebniny' nebo 'Dceři dres')..." 
                       class="w-full bg-[#222220] border border-white/5 rounded-2xl py-5 px-8 focus:outline-none focus:border-sky-500/30 text-lg shadow-2xl transition-all">
                <button onclick="saveEntry()" class="absolute right-3 top-3 bottom-3 bg-sky-600 hover:bg-sky-500 text-white px-8 rounded-xl font-bold transition-all active:scale-95 shadow-lg shadow-sky-900/20">ULOŽIT</button>
            </div>
        </footer>
    </main>

    <div id="modal" class="hidden fixed inset-0 bg-black/90 flex items-center justify-center z-50 p-6">
        <div class="bg-[#222220] p-10 rounded-[2.5rem] border border-white/5 max-w-sm w-full">
            <h3 class="serif text-2xl italic mb-6 text-white">Nastavení systému</h3>
            <label class="text-[10px] uppercase font-bold opacity-40 mb-2 block">Google Client ID</label>
            <input type="text" id="client-id-field" class="w-full bg-black/40 border border-white/5 rounded-xl p-4 text-xs mb-8 font-mono text-sky-400">
            <button onclick="saveID()" class="w-full bg-sky-600 py-4 rounded-xl font-bold uppercase text-xs mb-3 shadow-lg">Uložit & Restartovat</button>
            <button onclick="closeSettings()" class="w-full text-white/30 text-[10px] font-bold uppercase tracking-widest py-2">Zavřít</button>
        </div>
    </div>

    <script>
        let state = {
            tab: 'notes',
            id: localStorage.getItem('pb_id') || '',
            entries: JSON.parse(localStorage.getItem('pb_entries')) || [],
            events: []
        };

        let gClient;
        let gToken = null;

        window.onload = () => {
            if(state.id) initGoogle();
            setTab('notes');
        };

        function initGoogle() {
            gClient = google.accounts.oauth2.initTokenClient({
                client_id: state.id,
                scope: 'https://www.googleapis.com/auth/calendar.readonly',
                callback: (r) => { if(r.access_token) { gToken = r.access_token; syncData(); } }
            });
        }
