<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Petr's Brain v3.1</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <style>
        body { background: #0b0f1a; color: #e2e8f0; font-family: 'Inter', sans-serif; overflow: hidden; }
        .card { background: rgba(30, 41, 59, 0.4); border: 1px solid #334155; border-radius: 16px; transition: all 0.3s; }
        .active-module { border-left: 4px solid #0ea5e9; background: #1e293b !important; }
        .scroll-area { height: calc(100vh - 180px); overflow-y: auto; scrollbar-width: thin; }
        .ai-suggestion { background: linear-gradient(90deg, rgba(14, 165, 233, 0.1), transparent); border-left: 4px solid #0ea5e9; }
    </style>
</head>
<body class="flex h-screen bg-[#080c14]">

    <nav class="w-72 bg-slate-900 border-r border-slate-800 flex flex-col p-6">
        <div class="mb-10">
            <h1 class="text-2xl font-black text-sky-400 italic tracking-tighter text-shadow-sm">PETR'S BRAIN</h1>
            <p class="text-[10px] text-slate-500 uppercase font-bold tracking-widest">Digital Twin v3.1</p>
        </div>
        
        <div class="space-y-2 flex-1">
            <button onclick="switchModule('dashboard')" id="btn-dashboard" class="w-full p-4 rounded-xl text-left hover:bg-slate-800 transition active-module flex items-center gap-3"><span>🚀</span> Přehled dne</button>
            <button onclick="switchModule('notes')" id="btn-notes" class="w-full p-4 rounded-xl text-left hover:bg-slate-800 transition flex items-center gap-3"><span>📝</span> Zápisník</button>
            <button onclick="switchModule('family')" id="btn-family" class="w-full p-4 rounded-xl text-left hover:bg-slate-800 transition flex items-center gap-3"><span>👨‍👩‍👧</span> Rodina</button>
        </div>

        <div class="mt-auto pt-6 border-t border-slate-800">
            <div id="sync-status" class="text-[10px] font-mono text-slate-600 mb-4 flex items-center gap-2 uppercase tracking-tighter">
                <span id="st-dot" class="w-2 h-2 rounded-full bg-slate-700"></span> <span>Sync Offline</span>
            </div>
            <button onclick="openSettings()" class="w-full py-3 bg-slate-800 rounded-xl text-[10px] font-bold uppercase tracking-widest text-slate-400 hover:text-white transition">⚙️ Nastavení</button>
        </div>
    </nav>

    <main class="flex-1 flex flex-col">
        <header class="h-20 border-b border-slate-800/60 flex items-center justify-between px-10 bg-slate-900/10 italic">
            <h2 id="module-title" class="text-sm font-bold uppercase tracking-widest text-slate-400">Přehled dne</h2>
            <button onclick="syncCalendar()" class="bg-sky-600/20 hover:bg-sky-600/40 text-sky-400 px-4 py-2 rounded-lg text-xs font-bold uppercase tracking-widest transition-all">Aktualizovat</button>
        </header>

        <div id="content" class="flex-1 p-10 scroll-area"></div>

        <footer class="p-6 bg-slate-900/40 border-t border-slate-800/60">
            <div class="max-w-5xl mx-auto flex gap-4">
                <input type="text" id="main-input" onkeypress="if(event.key==='Enter')handleInput()" placeholder="Zadej příkaz nebo poznámku..." class="flex-1 bg-slate-800/50 border border-slate-700 rounded-2xl py-4 px-6 focus:outline-none focus:border-sky-500/50">
                <button onclick="handleInput()" class="bg-sky-600 px-8 rounded-xl font-bold active:scale-95 transition-transform">ULOŽIT</button>
            </div>
        </footer>
    </main>

    <div id="modal-settings" class="hidden fixed inset-0 bg-black/95 flex items-center justify-center z-50">
        <div class="bg-slate-900 border border-slate-700 p-10 rounded-[2.5rem] max-w-md w-full shadow-2xl">
            <h3 class="text-xl font-black mb-6 text-white italic">SYSTÉM</h3>
            <input type="text" id="input-client-id" class="w-full bg-slate-850 border border-slate-700 rounded-xl p-4 text-xs mb-8 font-mono text-sky-400" placeholder="Vlož Client ID">
            <button onclick="saveClientId()" class="w-full bg-sky-600 py-4 rounded-xl font-bold uppercase text-xs tracking-widest">Uložit & Restart</button>
            <button onclick="closeSettings()" class="w-full mt-4 text-slate-500 text-xs uppercase font-bold">Zavřít</button>
        </div>
    </div>

    <script>
        let state = { currentModule: 'dashboard', clientId: localStorage.getItem('pb_client_id') || '', notes: JSON.parse(localStorage.getItem('pb_notes')) || [], events: [] };
        let tokenClient;
        let accessToken = null;

        window.onload = () => {
            if (state.clientId) initGapi();
            switchModule('dashboard');
        };

        function initGapi() {
            tokenClient = google.accounts.oauth2.initTokenClient({
                client_id: state.clientId,
                scope: 'https://www.googleapis.com/auth/calendar.readonly',
                callback: (resp) => {
                    if (resp.access_token) {
                        accessToken = resp.access_token;
                        document.getElementById('sync-status').innerText = 'Sync Online';
                        document.getElementById('st-dot').classList.replace('bg-slate-700', 'bg-green-500');
                        syncCalendar();
                    }
                },
            });
        }

        async function syncCalendar() {
            if (!accessToken) { tokenClient.requestAccessToken({prompt: ''}); return; }
            const start = new Date(); start.setHours(0,0,0,0);
            const end = new Date(); end.setHours(23,59,59,999);
            
            try {
                // Krok 1: Seznam všech tvých kalendářů
                const listResp = await fetch('https://www.googleapis.com/calendar/v3/users/me/calendarList', { headers: { 'Authorization': `Bearer ${accessToken}` } });
                const listData = await listResp.json();
                
                let allEvents = [];
                // Krok 2: Projít každý kalendář (hlavní, rodinný, pracovní...)
                for (const cal of (listData.items || [])) {
                    const resp = await fetch(`https://www.googleapis.com/calendar/v3/calendars/${encodeURIComponent(cal.id)}/events?timeMin=${start.toISOString()}&timeMax=${end.toISOString()}&singleEvents=true&orderBy=startTime`, { headers: { 'Authorization': `Bearer ${accessToken}` } });
                    const data = await resp.json();
                    if (data.items) allEvents = allEvents.concat(data.items);
                }
                
                state.events = allEvents.sort((a,b) => new Date(a.start.dateTime || a.start.date) - new Date(b.start.dateTime || b.start.date));
                render();
            } catch (e) { console.error("Chyba:", e); }
        }

        function switchModule(mod) {
            state.currentModule = mod;
            document.querySelectorAll('nav button').forEach(b => b.classList.remove('active-module'));
            document.getElementById('btn-' + mod).classList.add('active-module');
            document.getElementById('module-title').innerText = document.getElementById('btn-' + mod).innerText.substring(3);
            render();
        }

        function render() {
            const container = document.getElementById('content');
            container.innerHTML = '';

            if (state.currentModule === 'dashboard') {
                let html = `<div class="grid grid-cols-1 lg:grid-cols-2 gap-10"><div><h3 class="text-xs font-black text-slate-500 uppercase tracking-widest mb-6">Osa dne</h3>`;
                
                if (state.events.length > 0) {
                    state.events.forEach(ev => {
                        const t = ev.start.dateTime ? new Date(ev.start.dateTime).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}) : 'Den';
                        html += `<div class="card p-5 mb-3 flex items-center gap-6 border-l-4 border-sky-500/50 shadow-lg">
                                    <span class="font-mono text-sky-400 font-bold w-12 text-center">${t}</span>
                                    <span class="text-sm font-bold">${ev.summary}</span>
                                 </div>`;
                    });
                } else {
                    html += `<p class="text-slate-600 italic text-sm p-4 border border-dashed border-slate-800 rounded-xl">Žádné události nenalezeny. Zkus kliknout na Aktualizovat.</p>`;
                }

                html += `</div><div><h3 class="text-xs font-black text-slate-500 uppercase tracking-widest mb-6">Analýza Brainu</h3>
                         <div class="card p-8 ai-suggestion">
                            <p class="text-sky-300 font-bold mb-3 italic">Kontextuální doporučení:</p>
                            <p class="text-sm leading-relaxed text-slate-300">
                                Na základě tvých dnešních kroužků (BESIP, DDM) máš největší klid na práci <strong>mezi 10:00 a 13:00</strong>. Doporučuji v tomto okně vyřešit ty zakázky ze včerejška.
                            </p>
                         </div>
                         </div></div>`;
                container.innerHTML = html;
            } else if (state.currentModule === 'notes') {
                container.innerHTML = state.notes.length ? state.notes.map(n => `<div class="card p-6 mb-4 border-l-4 border-slate-700 text-sm"><div class="text-[10px] text-slate-500 mb-2">${new Date(n.time).toLocaleString()}</div>${n.text}</div>`).reverse().join('') : '<p class="text-center py-20 opacity-20 italic uppercase tracking-widest text-xs">Bez záznamů</p>';
            }
        }

        function handleInput() {
            const input = document.getElementById('main-input');
            if (!input.value.trim()) return;
            state.notes.push({ text: input.value, time: new Date().toISOString() });
            localStorage.setItem('pb_notes', JSON.stringify(state.notes));
            input.value = '';
            render();
        }

        function openSettings() { document.getElementById('modal-settings').classList.remove('hidden'); }
        function closeSettings() { document.getElementById('modal-settings').classList.add('hidden'); }
        function saveClientId() { const id = document.getElementById('input-client-id').value.trim(); if(id) { localStorage.setItem('pb_client_id', id); location.reload(); } }
    </script>
</body>
</html>
