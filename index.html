<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Petr's Brain v2.1</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <style>
        body { background: #0f172a; color: #f8fafc; font-family: 'Inter', sans-serif; overflow: hidden; }
        .module-btn { transition: all 0.2s; border: 1px solid #1e293b; }
        .module-btn:hover { background: #1e293b; border-color: #38bdf8; }
        .active-module { background: #1e293b; border-color: #0ea5e9; box-shadow: 0 0 15px rgba(14, 165, 233, 0.1); }
        .scroll-area { height: calc(100vh - 160px); overflow-y: auto; scrollbar-width: thin; }
        .card { background: rgba(30, 41, 59, 0.5); border: 1px solid #334155; border-radius: 12px; padding: 1rem; }
        .slot-free { border-left: 4px solid #22c55e; background: rgba(34, 197, 94, 0.05); }
        .slot-busy { border-left: 4px solid #ef4444; background: rgba(239, 68, 68, 0.05); }
    </style>
</head>
<body class="flex h-screen overflow-hidden">

    <nav class="w-64 bg-slate-900 border-r border-slate-800 flex flex-col p-4 space-y-2">
        <div class="mb-6 px-2">
            <h1 class="text-xl font-bold text-sky-400">Petr's Brain</h1>
            <p class="text-[10px] text-slate-500 uppercase tracking-widest">Contextual Assistant</p>
        </div>
        
        <button onclick="switchModule('notes')" id="btn-notes" class="module-btn p-3 rounded-xl text-left flex items-center gap-3 active-module"><span>📝</span> Zápisník</button>
        <button onclick="switchModule('week')" id="btn-week" class="module-btn p-3 rounded-xl text-left flex items-center gap-3"><span>📅</span> Týden & Okna</button>
        <button onclick="switchModule('family')" id="btn-family" class="module-btn p-3 rounded-xl text-left flex items-center gap-3"><span>👨‍👩‍👧</span> Rodina</button>
        <button onclick="switchModule('personal')" id="btn-personal" class="module-btn p-3 rounded-xl text-left flex items-center gap-3"><span>🧘</span> Osobní</button>
        <button onclick="switchModule('projects')" id="btn-projects" class="module-btn p-3 rounded-xl text-left flex items-center gap-3"><span>🏗️</span> Projekty</button>
        <button onclick="switchModule('method')" id="btn-method" class="module-btn p-3 rounded-xl text-left flex items-center gap-3"><span>📖</span> Metodika</button>

        <div class="mt-auto pt-4 border-t border-slate-800 space-y-1">
            <div id="status-drive" class="text-[10px] flex items-center gap-2 px-2 text-slate-500">
                <span class="w-2 h-2 rounded-full bg-slate-700"></span> Drive Sync
            </div>
            <div id="status-cal" class="text-[10px] flex items-center gap-2 px-2 text-slate-500">
                <span class="w-2 h-2 rounded-full bg-slate-700"></span> Google Kalendář
            </div>
            <button onclick="openSettings()" class="w-full mt-2 p-2 text-xs bg-slate-800 rounded-lg hover:bg-slate-700">⚙️ Nastavení</button>
        </div>
    </nav>

    <main class="flex-1 flex flex-col bg-slate-950">
        <header class="h-16 border-b border-slate-800 flex items-center justify-between px-6 bg-slate-900/30">
            <h2 id="module-title" class="text-lg font-medium text-slate-200">Zápisník</h2>
            <div id="module-actions" class="flex gap-2"></div>
        </header>

        <div id="content" class="flex-1 p-6 scroll-area"></div>

        <footer class="p-4 bg-slate-900/50 border-t border-slate-800">
            <div class="max-w-3xl mx-auto flex gap-3">
                <button onclick="startVoice()" class="p-3 bg-slate-800 rounded-xl hover:bg-slate-700 text-xl">🎤</button>
                <input type="text" id="main-input" placeholder="Napiš cokoliv — AI zařadí sama..." 
                       class="flex-1 bg-slate-800/50 border border-slate-700 rounded-xl px-4 focus:outline-none focus:border-sky-500 transition-all">
                <button onclick="handleInput()" class="bg-sky-600 hover:bg-sky-500 px-6 rounded-xl font-bold transition-all">🚀</button>
            </div>
        </footer>
    </main>

    <div id="modal-settings" class="hidden fixed inset-0 bg-black/60 backdrop-blur-sm flex items-center justify-center z-50">
        <div class="bg-slate-900 border border-slate-700 p-8 rounded-3xl max-w-sm w-full shadow-2xl">
            <h3 class="text-xl font-bold mb-2">Google Integrace</h3>
            <p class="text-slate-400 text-xs mb-6">Vlož své Client ID pro propojení Drive a Kalendáře.</p>
            <input type="text" id="input-client-id" placeholder="123456...apps.googleusercontent.com" 
                   class="w-full bg-slate-800 border border-slate-700 rounded-xl p-3 text-xs mb-4 focus:outline-none focus:border-sky-500">
            <div class="flex flex-col gap-2">
                <button onclick="saveClientId()" class="w-full bg-sky-600 py-3 rounded-xl font-bold">Připojit Google</button>
                <button onclick="closeSettings()" class="w-full py-2 text-slate-500 text-sm">Zavřít</button>
            </div>
        </div>
    </div>

    <script>
        let state = {
            currentModule: 'notes',
            clientId: localStorage.getItem('pb_client_id') || '',
            notes: [],
            events: [],
            personal: { weight: null, energy: 5 },
            family: { jan17: '', jan21: '', eliska: '' }
        };

        let tokenClient;
        let accessToken = null;

        window.onload = () => {
            loadState();
            if (state.clientId) initGapi();
            switchModule('notes');
        };

        function initGapi() {
            tokenClient = google.accounts.oauth2.initTokenClient({
                client_id: state.clientId,
                scope: 'https://www.googleapis.com/auth/drive.file https://www.googleapis.com/auth/calendar.readonly',
                callback: (tokenResponse) => {
                    accessToken = tokenResponse.access_token;
                    updateStatus('drive', true);
                    updateStatus('cal', true);
                    if(state.currentModule === 'week') syncCalendar();
                },
            });
        }

        function updateStatus(id, active) {
            const el = document.getElementById('status-' + id).querySelector('span');
            el.className = `w-2 h-2 rounded-full ${active ? 'bg-green-500' : 'bg-slate-700'}`;
        }

        function switchModule(mod) {
            state.currentModule = mod;
            document.querySelectorAll('.module-btn').forEach(b => b.classList.remove('active-module'));
            document.getElementById('btn-' + mod).classList.add('active-module');
            document.getElementById('module-title').innerText = document.getElementById('btn-' + mod).innerText.split(' ')[1];
            render();
        }

        function render() {
            const container = document.getElementById('content');
            container.innerHTML = '';

            switch(state.currentModule) {
                case 'notes':
                    container.innerHTML = state.notes.map(n => `
                        <div class="card mb-3">
                            <div class="flex justify-between text-[10px] text-slate-500 mb-1">
                                <span>${new Date(n.time).toLocaleString('cs-CZ')}</span>
                                <span class="uppercase tracking-tighter text-sky-500">${n.category}</span>
                            </div>
                            <p class="text-sm">${n.text}</p>
                        </div>
                    `).reverse().join('') || '<p class="text-slate-600 text-center py-20">Žádné zápisky.</p>';
                    break;
                case 'week':
                    renderWeek(container);
                    break;
                case 'family':
                    container.innerHTML = `<div class="card"><h4>Brzy: Detailní pohled na děti</h4></div>`;
                    break;
                case 'personal':
                    container.innerHTML = `<div class="card"><h4>Brzy: Zdraví a energie</h4></div>`;
                    break;
                case 'projects':
                    container.innerHTML = `<div class="card"><h4>Brzy: Plánování domu</h4></div>`;
                    break;
                case 'method':
                    container.innerHTML = `<div class="card"><h4>Brzy: Moje metodika</h4></div>`;
                    break;
            }
        }

        async function syncCalendar() {
            if (!accessToken) { tokenClient.requestAccessToken(); return; }
            const now = new Date();
            const end = new Date(); end.setHours(23,59,59);
            try {
                const resp = await fetch(`https://www.googleapis.com/calendar/v3/calendars/primary/events?timeMin=${now.toISOString()}&timeMax=${end.toISOString()}&singleEvents=true&orderBy=startTime`, {
                    headers: { 'Authorization': `Bearer ${accessToken}` }
                });
                const data = await resp.json();
                state.events = data.items || [];
                render();
            } catch (e) { console.error(e); }
        }

        function renderWeek(container) {
            let html = `<div class="bg-sky-900/20 p-4 rounded-xl border border-sky-800 mb-6 cursor-pointer" onclick="syncCalendar()">
                <p class="text-sky-300 text-sm font-bold flex items-center gap-2">🔄 Propojit / Aktualizovat Kalendář</p>
            </div>`;
            
            if (state.events.length > 0) {
                html += '<h3 class="font-bold mb-4">Dnešní program:</h3>';
                state.events.forEach(ev => {
                    const start = new Date(ev.start.dateTime || ev.start.date).toLocaleTimeString('cs-CZ', {hour:'2-digit', minute:'2-digit'});
                    html += `<div class="card mb-2 slot-busy text-sm"><b>${start}</b> - ${ev.summary}</div>`;
                });
            } else {
                html += '<p class="text-slate-500 mb-10">Načti kalendář pro zobrazení dne.</p>';
            }
            container.innerHTML = html;
        }

        function handleInput() {
            const input = document.getElementById('main-input');
            if (!input.value) return;
            state.notes.push({ text: input.value, time: new Date().toISOString(), category: state.currentModule });
            input.value = '';
            saveState();
            render();
        }

        function saveState() { localStorage.setItem('pb_state', JSON.stringify(state)); }
        function loadState() {
            const saved = localStorage.getItem('pb_state');
            if (saved) state = JSON.parse(saved);
        }
        function openSettings() { document.getElementById('modal-settings').classList.remove('hidden'); }
        function closeSettings() { document.getElementById('modal-settings').classList.add('hidden'); }
        function saveClientId() {
            const id = document.getElementById('input-client-id').value;
            localStorage.setItem('pb_client_id', id);
            location.reload();
        }
    </script>
</body>
</html>
