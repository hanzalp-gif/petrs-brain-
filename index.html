<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Petr's Brain v3.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <style>
        body { background: #0b0f1a; color: #e2e8f0; font-family: 'Inter', sans-serif; overflow: hidden; }
        .card { background: rgba(30, 41, 59, 0.4); border: 1px solid #334155; border-radius: 16px; transition: all 0.3s; }
        .card:hover { border-color: #38bdf8; background: rgba(30, 41, 59, 0.6); }
        .active-module { border-left: 4px solid #0ea5e9; background: #1e293b !important; }
        .scroll-area { height: calc(100vh - 180px); overflow-y: auto; scrollbar-width: thin; }
        .ai-suggestion { background: linear-gradient(90deg, rgba(14, 165, 233, 0.1), transparent); border-left: 4px solid #0ea5e9; }
    </style>
</head>
<body class="flex h-screen bg-[#080c14]">

    <nav class="w-72 bg-slate-900 border-r border-slate-800 flex flex-col p-6">
        <div class="mb-10">
            <h1 class="text-2xl font-black text-sky-400 italic tracking-tighter">PETR'S BRAIN</h1>
            <p class="text-[10px] text-slate-500 uppercase font-bold tracking-widest">Contextual Assistant</p>
        </div>
        
        <div class="space-y-2 flex-1">
            <button onclick="switchModule('dashboard')" id="btn-dashboard" class="w-full p-4 rounded-xl text-left hover:bg-slate-800 transition active-module flex items-center gap-3"><span>🚀</span> Přehled dne</button>
            <button onclick="switchModule('notes')" id="btn-notes" class="w-full p-4 rounded-xl text-left hover:bg-slate-800 transition flex items-center gap-3"><span>📝</span> Rychlé zápisky</button>
            <button onclick="switchModule('family')" id="btn-family" class="w-full p-4 rounded-xl text-left hover:bg-slate-800 transition flex items-center gap-3"><span>👨‍👩‍👧</span> Rodina & Děti</button>
            <button onclick="switchModule('projects')" id="btn-projects" class="w-full p-4 rounded-xl text-left hover:bg-slate-800 transition flex items-center gap-3"><span>🏗️</span> Rozpracované věci</button>
        </div>

        <div class="mt-auto pt-6 border-t border-slate-800">
            <button onclick="openSettings()" class="w-full py-3 bg-slate-800 rounded-xl text-[10px] font-bold uppercase tracking-widest text-slate-400 hover:text-white transition">⚙️ Konfigurace</button>
        </div>
    </nav>

    <main class="flex-1 flex flex-col">
        <header class="h-20 border-b border-slate-800/60 flex items-center justify-between px-10 bg-slate-900/10">
            <h2 id="module-title" class="text-lg font-bold uppercase tracking-widest text-slate-400">Přehled dne</h2>
            <div id="sync-status" class="text-[10px] font-mono text-slate-600 italic uppercase">Sync neaktivní</div>
        </header>

        <div id="content" class="flex-1 p-10 scroll-area">
            </div>

        <footer class="p-6 bg-slate-900/40 border-t border-slate-800/60">
            <div class="max-w-5xl mx-auto relative">
                <input type="text" id="main-input" onkeypress="if(event.key==='Enter')handleInput()" 
                       placeholder="Např: 'Zítra v 10 schůzka' nebo 'Dceři koupit dres'..." 
                       class="w-full bg-slate-800/50 border border-slate-700/50 rounded-2xl py-5 px-8 pr-32 focus:outline-none focus:border-sky-500/50 text-base shadow-2xl">
                <button onclick="handleInput()" class="absolute right-3 top-3 bottom-3 bg-sky-600 hover:bg-sky-500 px-8 rounded-xl font-bold transition-all active:scale-95 shadow-lg">ZAPRACOVAT</button>
            </div>
        </footer>
    </main>

    <div id="modal-settings" class="hidden fixed inset-0 bg-black/95 flex items-center justify-center z-50">
        <div class="bg-slate-900 border border-slate-700 p-10 rounded-[2.5rem] max-w-md w-full">
            <h3 class="text-xl font-black mb-6 text-white italic uppercase">Systémové nastavení</h3>
            <label class="text-[10px] font-bold text-sky-500 uppercase mb-2 block">Google Client ID</label>
            <input type="text" id="input-client-id" class="w-full bg-slate-850 border border-slate-700 rounded-xl p-4 text-xs mb-8 font-mono">
            <button onclick="saveClientId()" class="w-full bg-sky-600 py-4 rounded-xl font-bold uppercase text-xs tracking-widest">Uložit & Restartovat</button>
            <button onclick="closeSettings()" class="w-full mt-4 text-slate-500 text-xs uppercase font-bold">Zavřít</button>
        </div>
    </div>

    <script>
        let state = {
            currentModule: 'dashboard',
            clientId: localStorage.getItem('pb_client_id') || '',
            notes: JSON.parse(localStorage.getItem('pb_notes')) || [],
            events: []
        };

        let tokenClient;
        let accessToken = null;

        window.onload = () => {
            if (state.clientId) initGapi();
            switchModule('dashboard');
        };

        function initGapi() {
            tokenClient = google.accounts.oauth2.initTokenClient({
                client_id: state.clientId,
                scope: 'https://www.googleapis.com/auth/calendar.readonly',
                callback: (resp) => {
                    accessToken = resp.access_token;
                    document.getElementById('sync-status').innerText = 'Sync Online';
                    document.getElementById('sync-status').className = 'text-[10px] font-mono text-green-500 font-bold';
                    syncCalendar();
                },
            });
            tokenClient.requestAccessToken({prompt: ''});
        }

        function switchModule(mod) {
            state.currentModule = mod;
            document.querySelectorAll('nav button').forEach(b => b.classList.remove('active-module'));
            document.getElementById('btn-' + mod).classList.add('active-module');
            document.getElementById('module-title').innerText = document.getElementById('btn-' + mod).innerText.substring(3);
            render();
        }

        async function syncCalendar() {
            if (!accessToken) return;
            const start = new Date(); start.setHours(0,0,0,0);
            try {
                const resp = await fetch(`https://www.googleapis.com/calendar/v3/calendars/primary/events?timeMin=${start.toISOString()}&singleEvents=true&orderBy=startTime`, {
                    headers: { 'Authorization': `Bearer ${accessToken}` }
                });
                const data = await resp.json();
                state.events = data.items || [];
                render();
            } catch (e) { console.error(e); }
        }

        function render() {
            const container = document.getElementById('content');
            container.innerHTML = '';

            if (state.currentModule === 'dashboard') {
                // Sekce 1: Kalendář (Faktická data)
                let html = `<div class="grid grid-cols-1 lg:grid-cols-2 gap-10"><div><h3 class="text-xs font-black text-slate-500 uppercase tracking-widest mb-6">Dnešní osa</h3>`;
                
                if (state.events.length > 0) {
                    state.events.slice(0, 5).forEach(ev => {
                        const t = ev.start.dateTime ? new Date(ev.start.dateTime).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}) : 'Celý den';
                        html += `<div class="card p-5 mb-3 flex items-center gap-6 border-l-4 border-sky-500/50">
                                    <span class="font-mono text-sky-400 font-bold">${t}</span>
                                    <span class="text-sm font-bold">${ev.summary}</span>
                                 </div>`;
                    });
                } else {
                    html += `<p class="text-slate-600 italic text-sm">Žádné události. Máš volné pole působnosti.</p>`;
                }

                // Sekce 2: AI Analýza (To, co jsi chtěl - pomoc)
                html += `</div><div><h3 class="text-xs font-black text-slate-500 uppercase tracking-widest mb-6">Analýza Petra</h3>`;
                html += `<div class="card p-8 ai-suggestion">
                            <p class="
