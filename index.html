<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Petr's Brain Extended</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://accounts.google.com/gsi/client" async defer></script>
<style>
body { font-family:sans-serif; background:#121212; color:#eee; margin:0; }
.sidebar { width:220px; background:#1e1e1e; height:100vh; position:fixed; top:0; left:0; display:flex; flex-direction:column; padding-top:10px; }
.main { margin-left:220px; padding:16px; }
.button { background:#333; color:#eee; padding:8px; margin:4px; cursor:pointer; border-radius:4px; text-align:center; }
.button:hover { background:#444; }
.module { display:none; }
.module.active { display:block; }
textarea { background:#1a1a1a; color:#eee; border:1px solid #444; padding:8px; border-radius:4px; width:100%; }
.event { padding:4px; margin:2px 0; border-radius:4px; }
.event.projects { background:#2563eb; }
.event.family { background:#16a34a; }
.event.personal { background:#db2777; }
.event.method { background:#f59e0b; }
.filter-btn { padding:4px 8px; margin:2px; border-radius:4px; cursor:pointer; border:1px solid #555; }
.filter-btn.active { background:#444; }
</style>
</head>
<body>
<div class="sidebar">
  <div class="button" onclick="switchModule('notebook')">Zápisník</div>
  <div class="button" onclick="switchModule('week')">Týden</div>
  <div class="button" onclick="switchModule('projects')">Projekty</div>
  <div class="button" onclick="switchModule('method')">Metodika</div>
  <div class="button" onclick="switchModule('family')">Rodina</div>
  <div class="button" onclick="switchModule('personal')">Osobní</div>
  <div class="button" onclick="switchModule('calendar')">Kalendář</div>
  <div class="button" id="driveBtn">Drive: nepropojeno</div>
  <div class="button" id="calendarBtn">Calendar: nepropojeno</div>
</div>

<div class="main">
  <div id="notebook" class="module active">
    <h2>Zápisník</h2>
    <textarea id="notebookInput" rows="6" placeholder="Zadej text..."></textarea>
    <button class="button" onclick="saveNote()">Uložit</button>
    <div id="notebookOutput"></div>
  </div>

  <div id="week" class="module">
    <h2>Týden</h2>
    <div>
      <span class="filter-btn active" onclick="filterWeek('all')">Vše</span>
      <span class="filter-btn" onclick="filterWeek('projects')">Projekty</span>
      <span class="filter-btn" onclick="filterWeek('family')">Rodina</span>
      <span class="filter-btn" onclick="filterWeek('personal')">Osobní</span>
      <span class="filter-btn" onclick="filterWeek('method')">Metodika</span>
    </div>
    <div id="weekOutput">Načítám události z Google Calendar...</div>
  </div>

  <div id="projects" class="module"><h2>Projekty</h2><div id="projectsOutput"></div></div>
  <div id="method" class="module"><h2>Metodika</h2><div id="methodOutput"></div></div>
  <div id="family" class="module"><h2>Rodina</h2><div id="familyOutput"></div></div>
  <div id="personal" class="module"><h2>Osobní</h2><div id="personalOutput"></div></div>
  <div id="calendar" class="module"><h2>Kalendář</h2><div id="calendarOutput"></div></div>
</div>

<script>
let currentModule = 'notebook';
let driveToken = null;
let calendarToken = null;
let driveFileId = null;
let localData = { notes: [], projects: [], family: {}, personal: {}, method: [] };
let weekFilter = 'all';

// --- Přepínání modulů ---
function switchModule(module) {
  document.querySelectorAll('.module').forEach(m => m.classList.remove('active'));
  document.getElementById(module).classList.add('active');
  currentModule = module;
  if(module==='week') renderWeek();
}

// --- AI kategorie ---
function categorizeAI(text) {
  const lower = text.toLowerCase();
  if(lower.includes('projekt')) return 'projects';
  if(lower.includes('rodina') || lower.includes('dítě')) return 'family';
  if(lower.includes('osobní') || lower.includes('já')) return 'personal';
  return 'method';
}

// --- Zápisník ---
function saveNote() {
  const text = document.getElementById('notebookInput').value.trim();
  if(!text) return;
  const category = categorizeAI(text);
  const timestamp = new Date().toISOString();
  
  if(category==='projects') localData.projects.push({ text, date: timestamp });
  else if(category==='family') localData.family[timestamp] = text;
  else if(category==='personal') localData.personal[timestamp] = text;
  else localData.method.push({ text, date: timestamp });

  document.getElementById(`${category}Output`).innerText = JSON.stringify(localData[category], null, 2);
  document.getElementById('notebookOutput').innerText = `Zápisek uložen do: ${category}`;
  document.getElementById('notebookInput').value='';
  syncToDrive();
  renderWeek();
}

// --- Drive synchronizace ---
function syncToDrive() {
  if(!driveToken) return;
  if(!driveFileId) {
    fetch('https://www.googleapis.com/drive/v3/files', {
      method:'POST',
      headers:{'Authorization':'Bearer '+driveToken.access_token,'Content-Type':'application/json'},
      body: JSON.stringify({name:'brain-unified.json', mimeType:'application/json'})
    }).then(r=>r.json()).then(res=>{
      driveFileId=res.id;
      updateDrive();
    });
  } else updateDrive();
}

function updateDrive() {
  fetch(`https://www.googleapis.com/upload/drive/v3/files/${driveFileId}?uploadType=media`, {
    method:'PATCH',
    headers:{'Authorization':'Bearer '+driveToken.access_token,'Content-Type':'application/json'},
    body: JSON.stringify(localData)
  }).then(()=>{ document.getElementById('driveBtn').innerText='Drive: OK'; })
  .catch(err=>{ console.error(err); document.getElementById('driveBtn').innerText='Drive: chyba'; });
}

// --- Google OAuth ---
document.getElementById('driveBtn').onclick = () => {
  if(driveToken) { alert('Drive již připojeno'); return; }
  google.accounts.oauth2.initTokenClient({
    client_id: 'TVŮJ_GOOGLE_CLIENT_ID',
    scope: 'https://www.googleapis.com/auth/drive.file',
    callback: token => { driveToken = token; document.getElementById('driveBtn').innerText='Drive: OK'; }
  }).requestAccessToken();
}

document.getElementById('calendarBtn').onclick = () => {
  if(calendarToken) { alert('Calendar již připojeno'); return; }
  google.accounts.oauth2.initTokenClient({
    client_id: 'TVŮJ_GOOGLE_CLIENT_ID',
    scope: 'https://www.googleapis.com/auth/calendar.readonly',
    callback: token => { calendarToken = token; document.getElementById('calendarBtn').innerText='Calendar: OK'; loadCalendar(); }
  }).requestAccessToken();
}

// --- Načtení Kalendáře ---
let calendarEvents = [];
function loadCalendar() {
  if(!calendarToken) { document.getElementById('weekOutput').innerText='Kalendář není připojen.'; return; }
  fetch('https://www.googleapis.com/calendar/v3/calendars/primary/events?timeMin='+new Date().toISOString(), {
    headers:{'Authorization':'Bearer '+calendarToken.access_token}
  }).then(r=>r.json()).then(data=>{
    calendarEvents = data.items || [];
    renderWeek();
  });
}

// --- Render týdne ---
function renderWeek() {
  const output = document.getElementById('weekOutput');
  output.innerHTML = '';
  const startOfWeek = new Date();
  startOfWeek.setDate(startOfWeek.getDate() - startOfWeek.getDay() + 1);
  for(let i=0;i<7;i++){
    const day = new Date(startOfWeek);
    day.setDate(day.getDate()+i);
    const dayStr = day.toISOString().split('T')[0];
    const dayDiv = document.createElement('div');
    dayDiv.innerHTML = `<strong>${day.toLocaleDateString('cs-CZ', { weekday: 'long', day:'numeric', month:'numeric'})}</strong>`;
    
    // Zápisky
    ['projects','family','personal','method'].forEach(cat=>{
      if(weekFilter!=='all' && weekFilter!==cat) return;
      const items = cat==='family' ? Object.entries(localData.family).filter(e=>e[0].startsWith(dayStr)).map(e=>e[1]) : localData[cat].filter(e=>e.date.startsWith(dayStr)).map(e=>e.text);
      items.forEach(text=>{
        const ev = document.createElement('div');
        ev.className = `event ${cat}`;
        ev.textContent = text;
        dayDiv.appendChild(ev);
      });
    });
    
    // Google Calendar události
    calendarEvents.forEach(ev=>{
      const start = ev.start.dateTime||ev.start.date;
      if(start.startsWith(dayStr)){
        const evDiv = document.createElement('div');
        evDiv.className = 'event projects';
        evDiv.textContent = ev.summary || 'Událost';
        dayDiv.appendChild(evDiv);
      }
    });
    
    output.appendChild(dayDiv);
  }
}

function filterWeek(cat){
  weekFilter = cat;
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
  if(cat==='all') document.querySelector('.filter-btn').classList.add('active');
  else document.querySelectorAll('.filter-btn').forEach(b=>{ if(b.textContent.toLowerCase()===cat) b.classList.add('active'); });
  renderWeek();
}

// --- PWA Service Worker ---
if('serviceWorker' in navigator){
  navigator.serviceWorker.register('sw.js').then(reg => console.log('SW registered', reg))
  .catch(err => console.log('SW error', err));
}
</script>
</body>
</html>
