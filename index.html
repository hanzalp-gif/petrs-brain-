<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Petr's Brain v2.2</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <style>
        body { background: #0f172a; color: #f8fafc; font-family: 'Inter', sans-serif; overflow: hidden; }
        .module-btn { transition: all 0.2s; border: 1px solid #1e293b; }
        .module-btn:hover { background: #1e293b; border-color: #38bdf8; }
        .active-module { background: #1e293b; border-color: #0ea5e9; box-shadow: 0 0 15px rgba(14, 165, 233, 0.1); }
        .scroll-area { height: calc(100vh - 160px); overflow-y: auto; scrollbar-width: thin; }
        .card { background: rgba(30, 41, 59, 0.5); border: 1px solid #334155; border-radius: 12px; padding: 1rem; }
        .slot-free { border-left: 4px solid #22c55e; background: rgba(34, 197, 94, 0.05); }
        .slot-busy { border-left: 4px solid #0ea5e9; background: rgba(14, 165, 233, 0.05); }
    </style>
</head>
<body class="flex h-screen overflow-hidden text-slate-200">

    <nav class="w-64 bg-slate-900 border-r border-slate-800 flex flex-col p-4 space-y-2">
        <div class="mb-6 px-2">
            <h1 class="text-xl font-bold text-sky-400 leading-tight">Petr's Brain</h1>
            <p class="text-[10px] text-slate-500 uppercase tracking-widest">Digital Twin v2</p>
        </div>
        <button onclick="switchModule('notes')" id="btn-notes" class="module-btn p-3 rounded-xl text-left flex items-center gap-3 active-module"><span>📝</span> Zápisník</button>
        <button onclick="switchModule('week')" id="btn-week" class="module-btn p-3 rounded-xl text-left flex items-center gap-3"><span>📅</span> Týden & Okna</button>
        <button onclick="switchModule('family')" id="btn-family" class="module-btn p-3 rounded-xl text-left flex items-center gap-3"><span>👨‍👩‍👧</span> Rodina</button>
        <button onclick="switchModule('personal')" id="btn-personal" class="module-btn p-3 rounded-xl text-left flex items-center gap-3"><span>🧘</span> Osobní</button>
        <button onclick="switchModule('projects')" id="btn-projects" class="module-btn p-3 rounded-xl text-left flex items-center gap-3"><span>🏗️</span> Projekty</button>
        <button onclick="switchModule('method')" id="btn-method" class="module-btn p-3 rounded-xl text-left flex items-center gap-3"><span>📖</span> Metodika</button>

        <div class="mt-auto pt-4 border-t border-slate-800 space-y-2">
            <div id="status-drive" class="text-[10px] flex items-center gap-2 px-2 text-slate-500">
                <span class="w-2 h-2 rounded-full bg-slate-700"></span> Drive Sync
            </div>
            <div id="status-cal" class="text-[10px] flex items-center gap-2 px-2 text-slate-500">
                <span class="w-2 h-2 rounded-full bg-slate-700"></span> Kalendář Sync
            </div>
            <button onclick="openSettings()" class="w-full mt-2 p-2 text-xs bg-slate-800/50 rounded-lg hover:bg-slate-700 transition">⚙️ Nastavení</button>
        </div>
    </nav>

    <main class="flex-1 flex flex-col bg-slate-950">
        <header class="h-16 border-b border-slate-800 flex items-center justify-between px-6 bg-slate-900/30 backdrop-blur-md">
            <h2 id="module-title" class="text-lg font-semibold tracking-tight">Zápisník</h2>
        </header>

        <div id="content" class="flex-1 p-6 scroll-area"></div>

        <footer class="p-4 bg-slate-900/50 border-t border-slate-800">
            <div class="max-w-3xl mx-auto flex gap-3">
                <button onclick="startVoice()" class="p-3 bg-slate-800 rounded-xl hover:bg-slate-700 text-xl transition">🎤</button>
                <input type="text" id="main-input" onkeypress="if(event.key==='Enter')handleInput()" placeholder="Napiš cokoliv — AI zařadí sama..." 
                       class="flex-1 bg-slate-800/40 border border-slate-700/50 rounded-xl px-4 focus:outline-none focus:border-sky-500/50 transition-all placeholder:text-slate-600">
                <button onclick="handleInput()" class="bg-sky-600 hover:bg-sky-500 px-6 rounded-xl font-bold transition-all shadow-lg shadow-sky-900/20">🚀</button>
            </div>
        </footer>
    </main>

    <div id="modal-settings" class="hidden fixed inset-0 bg-black/80 backdrop-blur-sm flex items-center justify-center z-50 p-4">
        <div class="bg-slate-900 border border-slate-700 p-8 rounded-3xl max-w-sm w-full shadow-2xl">
            <h3 class="text-xl font-bold mb-2">Google Integrace</h3>
            <p class="text-slate-400 text-xs mb-6">Vlož své Client ID pro propojení.</p>
            <input type="text" id="input-client-id" class="w-full bg-slate-800 border border-slate-700 rounded-xl p-3 text-xs mb-4 focus:outline-none focus:border-sky-500 font-mono">
            <div class="flex flex-col gap-2">
                <button onclick="saveClientId()" class="w-full bg-sky-600 py-3 rounded-xl font-bold">Aktualizovat a Připojit</button>
                <button onclick="closeSettings()" class="w-full py-2 text-slate-500 text-sm">Zavřít</button>
            </div>
        </div>
    </div>

    <script>
        let state = {
            currentModule: 'notes',
            clientId: localStorage.getItem('pb_client_id') || '',
            notes: JSON.parse(localStorage.getItem('pb_notes')) || [],
            events: [],
            family: { eliska: '', jan17: '', jan21: '' }
        };

        let tokenClient;
        let accessToken = null;

        window.onload = () => {
            if (state.clientId) initGapi();
            switchModule('notes');
        };

        function initGapi() {
            tokenClient = google.accounts.oauth2.initTokenClient({
                client_id: state.clientId,
                scope: 'https://www.googleapis.com/auth/drive.file https://www.googleapis.com/auth/calendar.readonly',
                callback: (resp) => {
                    accessToken = resp.access_token;
                    updateStatus('drive', true);
                    updateStatus('cal', true);
                    if(state.currentModule === 'week') syncCalendar();
                },
            });
        }

        function updateStatus(id, active) {
            const el = document.getElementById('status-' + id).querySelector('span');
            el.className = `w-2 h-2 rounded-full ${active ? 'bg-green-500 shadow-[0_0_8px_rgba(34,197,94,0.6)]' : 'bg-slate-700'}`;
        }

        function switchModule(mod) {
            state.currentModule = mod;
            document.querySelectorAll('.module-btn').forEach(b => b.classList.remove('active-module'));
            const btn = document.getElementById('btn-' + mod);
            if(btn) btn.classList.add('active-module');
            document.getElementById('module-title').innerText = btn ? btn.innerText.substring(3) : mod;
            render();
        }

        async function syncCalendar() {
            if (!accessToken) { tokenClient.requestAccessToken(); return; }
            const start = new Date(); start.setHours(0,0,0,0);
            const end = new Date(); end.setHours(23,59,59,999);
            try {
                const resp = await fetch(`https://www.googleapis.com/calendar/v3/calendars/primary/events?timeMin=${start.toISOString()}&timeMax=${end.toISOString()}&singleEvents=true&orderBy=startTime`, {
                    headers: { 'Authorization': `Bearer ${accessToken}` }
                });
                const data = await resp.json();
                state.events = data.items || [];
                render();
            } catch (e) { console.error(e); }
        }

        function render() {
            const container = document.getElementById('content');
            container.innerHTML = '';

            if (state.currentModule === 'notes') {
                container.innerHTML = state.notes.length ? state.notes.map(n => `
                    <div class="card mb-3 border-l-2 border-sky-500/50">
                        <div class="flex justify-between text-[10px] text-slate-500 mb-1 font-mono uppercase">
                            <span>${new Date(n.time).toLocaleString('cs-CZ')}</span>
                            <span class="text-sky-400">${n.category}</span>
                        </div>
                        <p class="text-sm leading-relaxed">${n.text}</p>
                    </div>
                `).reverse().join('') : '<p class="text-slate-600 text-center py-20 italic">Zápisník je prázdný.</p>';
            } 
            else if (state.currentModule === 'week') {
                renderWeek(container);
            } else {
                container.innerHTML = `<div class="card border-dashed border-slate-700 text-center py-10 text-slate-500 italic">Modul ${state.currentModule} se připravuje k aktivaci...</div>`;
            }
        }

        function renderWeek(container) {
            let html = `
                <div class="flex items-center justify-between mb-6">
                    <div>
                        <h3 class="text-xl font-bold">Dnešní program</h3>
                        <p class="text-xs text-slate-500">${new Date().toLocaleDateString('cs-CZ', {weekday:'long', day:'numeric', month:'long'})}</p>
                    </div>
                    <button onclick="syncCalendar()" class="bg-slate-800 hover:bg-slate-700 p-2 rounded-lg text-xs transition flex items-center gap-2">
                        <span>🔄</span> Aktualizovat
                    </button>
                </div>
            `;
            
            if (state.events.length > 0) {
                state.events.forEach(ev => {
                    const start = new Date(ev.start.dateTime || ev.start.date).toLocaleTimeString('cs-CZ', {hour:'2-digit', minute:'2-digit'});
                    html += `<div class="card mb-2 slot-busy flex items-center justify-between">
                        <div><span class="text-xs font-mono text-sky-400 mr-3">${start}</span> <span class="text-sm font-medium">${ev.summary}</span></div>
                    </div>`;
                });
                
                // Jednoduchá logika pro volná okna (demo)
                html += `<div class="mt-8 mb-4 text-[10px] font-bold text-slate-500 uppercase tracking-widest">Detekovaná volná okna</div>`;
                html += `<div class="card slot-free border-dashed">
                    <p class="text-xs text-green-400 font-bold mb-1">Blok: cca 3 hodiny</p>
                    <p class="text-sm text-slate-300">Tady máš prostor na zakázku nebo rodinu.</p>
                </div>`;
            } else {
                html += `
                    <div class="text-center py-20 bg-slate-900/20 rounded-3xl border border-slate-800/50">
                        <p class="text-slate-500 mb-4">Žádné události v kalendáři pro dnešek.</p>
                        <button onclick="syncCalendar()" class="bg-sky-600/20 text-sky-400 px-6 py-2 rounded-xl border border-sky-500/20 hover:bg-sky-600/30 transition">
                            Načíst kalendář
                        </button>
                    </div>
                `;
            }
            container.innerHTML = html;
        }

        function handleInput() {
            const input = document.getElementById('main-input');
            if (!input.value) return;
            state.notes.push({ text: input.value, time: new Date().toISOString(), category: state.currentModule });
            input.value = '';
            localStorage.setItem('pb_notes', JSON.stringify(state.notes));
            render();
        }

        function openSettings() { document.getElementById('modal-settings').classList.remove('hidden'); }
        function closeSettings() { document.getElementById('modal-settings').classList.add('hidden'); }
        function saveClientId() {
            const id = document.getElementById('input-client-id').value;
            localStorage.setItem('pb_client_id', id);
            location.reload();
        }
    </script>
</body>
</html>
